<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="GFradio - Listen to radio stations from around the world">
  <meta name="theme-color" content="#e94560">
  <link rel="manifest" href="manifest.json">
  <title>GFradio</title>
</head>
<body>

  <!-- OFFLINE OVERLAY -->
  <div class="offline-overlay" id="offlineOverlay" role="alert" aria-live="assertive">
    <div class="icon" aria-hidden="true">📡</div>
    <h2>OFFLINE</h2>
    <p>Connection unavailable. Stations cannot be played.</p>
    <button id="retryBtn">RETRY</button>
  </div>

  <!-- MAP OVERLAY -->
  <div class="map-overlay" id="mapOverlay" role="dialog" aria-label="Mappa del mondo" aria-modal="true">
    <div class="map-container">
      <div class="map-header">
        <h2>WORLD MAP</h2>
        <button class="map-close" id="closeMap" aria-label="Close map">✕</button>
      </div>
      <div id="map"></div>
    </div>
  </div>

  <!-- SHORTCUTS MODAL -->
  <div class="shortcuts-modal" id="shortcutsModal" role="dialog" aria-label="Keyboard shortcuts" aria-modal="true">
    <div class="shortcuts-content">
      <h2>SHORTCUTS</h2>
      <div class="shortcut-row"><span>Play / Pause</span><span class="shortcut-key">Space</span></div>
      <div class="shortcut-row"><span>Mute</span><span class="shortcut-key">M</span></div>
      <div class="shortcut-row"><span>Favorite</span><span class="shortcut-key">F</span></div>
      <div class="shortcut-row"><span>Shortcuts</span><span class="shortcut-key">?</span></div>
      <div class="shortcut-close">
        <button class="page-btn" id="closeShortcuts">CLOSE</button>
      </div>
    </div>
  </div>

  <!-- TOAST CONTAINER (created by JS if needed) -->

  <!-- APP -->
  <div class="app">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar" role="navigation" aria-label="Navigation">
      <div class="sidebar-header">
        <h1>GFradio</h1>
        <div class="subtitle">59,000+ STATIONS</div>
      </div>
      <nav class="nav-list">
        <button class="nav-item active" data-section="search" aria-label="Search stations">
          <span class="icon" aria-hidden="true">🔍</span> SEARCH
        </button>
        <button class="nav-item" data-section="countries" aria-label="Browse by country">
          <span class="icon" aria-hidden="true">🌍</span> COUNTRIES
        </button>
        <button class="nav-item" data-section="languages" aria-label="Browse by language">
          <span class="icon" aria-hidden="true">🗣</span> LANGUAGES
        </button>
        <button class="nav-item" data-section="tags" aria-label="Browse by genre">
          <span class="icon" aria-hidden="true">🏷</span> GENRES
        </button>
        <button class="nav-item" data-section="top" aria-label="Top voted stations">
          <span class="icon" aria-hidden="true">⭐</span> TOP VOTED
        </button>
        <button class="nav-item" data-section="favorites" aria-label="Favorite stations">
          <span class="icon" aria-hidden="true">❤</span> FAVORITES
        </button>
        <button class="nav-item" data-section="history" aria-label="Listening history">
          <span class="icon" aria-hidden="true">📜</span> HISTORY
        </button>
        <button class="nav-item" data-section="eq" aria-label="Equalizer">
          <span class="icon" aria-hidden="true">🎛</span> EQUALIZER
        </button>
        <button class="nav-item" id="openMap" aria-label="Open world map">
          <span class="icon" aria-hidden="true">🗺</span> MAP
        </button>
      </nav>
    </aside>

    <!-- MAIN -->
    <main class="main">

      <!-- HEADER -->
      <header class="header">
        <button class="hamburger" id="hamburger" aria-label="Open menu" aria-expanded="false">☰</button>
        <div class="header-center">
          <h1>GFradio</h1>
        </div>
        <div class="header-actions">
          <button class="header-btn" id="themeBtn" title="Theme" aria-label="Change theme">🌙</button>
          <button class="header-btn" id="shortcutsBtn" title="Shortcuts" aria-label="Show keyboard shortcuts">⌨</button>
          <button class="header-btn" id="exportBtn" title="Export data" aria-label="Export data">💾</button>
          <button class="header-btn" id="importBtn" title="Import data" aria-label="Import data">📂</button>
          <input type="file" id="importInput" accept=".json" style="display:none" aria-hidden="true">
        </div>
      </header>

      <!-- NOW PLAYING -->
      <div class="now-playing" aria-live="polite" aria-label="Now playing">
        <div class="np-content">
          <div class="np-favicon" id="npFavicon">📻</div>
          <div class="np-info">
            <div class="np-station-name" id="npName">NO STATION</div>
            <div class="np-details">
              <span id="npCountry">Select a station</span>
              <span id="npCodec"></span>
              <span id="npBitrate"></span>
            </div>
          </div>
          <div class="np-actions">
            <button class="np-action-btn" id="npFavBtn" title="Favorite" aria-label="Add to favorites">♡</button>
            <button class="np-action-btn" id="shareBtn" title="Share" aria-label="Share station">🔗</button>
          </div>
        </div>
        <div class="vu-meter" id="vuMeter" role="meter" aria-label="Audio level" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"></div>
      </div>

      <!-- TRANSPORT -->
      <div class="transport" role="toolbar" aria-label="Playback controls">
        <button class="transport-btn" id="prevBtn" title="Previous" aria-label="Previous station">⏮</button>
        <button class="transport-btn play-btn" id="playBtn" title="Play/Pause" aria-label="Play">▶</button>
        <button class="transport-btn" id="nextBtn" title="Next" aria-label="Next station">⏭</button>
        <div class="volume-wrap">
          <span class="volume-icon" id="volumeIcon" aria-hidden="true">🔊</span>
          <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="75" aria-label="Volume">
          <span class="volume-val" id="volumeVal">75%</span>
        </div>
      </div>

      <!-- CONTENT -->
      <div class="content" id="content"></div>

    </main>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
